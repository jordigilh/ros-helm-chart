# =============================================================================
# Cost Management Infrastructure Chart Values
# =============================================================================
# This chart deploys the infrastructure components (PostgreSQL) separately
# from the application to allow for independent lifecycle management.
#
# Customers can point to their own existing PostgreSQL instead of using this.
# =============================================================================

# PostgreSQL Configuration
postgresql:
  # Enable/disable PostgreSQL deployment
  # Set to false if using external PostgreSQL
  enabled: true
  
  # Image configuration
  image:
    repository: registry.redhat.io/rhel8/postgresql-13
    tag: "1-109"
    pullPolicy: IfNotPresent
  
  # Database authentication
  auth:
    database: koku
    username: koku
    # Password will be auto-generated and stored in secret
    # You can override by setting existingSecret
    existingSecret: ""
    
  # Admin user for database initialization
  adminUser: postgres
  
  # Storage configuration
  persistence:
    enabled: true
    storageClassName: ""  # Use default storage class
    size: 20Gi
    accessModes:
      - ReadWriteOnce
  
  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  # Service configuration
  service:
    type: ClusterIP
    port: 5432
  
  # Security context
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

# Database Migration Job
# Runs Django migrations after PostgreSQL is ready
migration:
  image:
    repository: quay.io/jordigilh/koku
    tag: latest-with-ca-bundle-support
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Network Policy (OpenShift)
networkPolicy:
  enabled: true
  
# Service Account
serviceAccount:
  create: true
  name: cost-mgmt-infrastructure
  annotations: {}

