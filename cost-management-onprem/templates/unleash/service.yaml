{{- if .Values.unleash.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cost-mgmt.unleash.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.labels" . | nindent 4 }}
    app.kubernetes.io/component: unleash-server
spec:
  type: {{ .Values.unleash.service.type }}
  ports:
  - name: http
    port: {{ .Values.unleash.service.port }}
    targetPort: 4242
    protocol: TCP
  selector:
    {{- include "cost-mgmt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: unleash-server
{{- end }}

