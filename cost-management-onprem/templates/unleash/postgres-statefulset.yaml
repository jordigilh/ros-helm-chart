{{- if .Values.unleash.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cost-mgmt.unleash.name" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.labels" . | nindent 4 }}
    app.kubernetes.io/component: unleash-db
spec:
  serviceName: {{ include "cost-mgmt.unleash.name" . }}-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "cost-mgmt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: unleash-db
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: unleash-db
    spec:
      containers:
      - name: postgresql
        image: registry.redhat.io/rhel9/postgresql-13:latest
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRESQL_USER
          value: {{ .Values.unleash.database.user | quote }}
        - name: POSTGRESQL_PASSWORD
          value: {{ .Values.unleash.database.password | quote }}
        - name: POSTGRESQL_DATABASE
          value: {{ .Values.unleash.database.name | quote }}
        - name: PGDATA
          value: /var/lib/pgsql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/pgsql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U ${POSTGRESQL_USER} -d ${POSTGRESQL_DATABASE}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U ${POSTGRESQL_USER} -d ${POSTGRESQL_DATABASE}
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.unleash.database.storage | default "1Gi" }}
{{- end }}

