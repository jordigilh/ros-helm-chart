{{- if .Values.unleash.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cost-mgmt.unleash.name" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.labels" . | nindent 4 }}
    app.kubernetes.io/component: unleash-db
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    {{- include "cost-mgmt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: unleash-db
{{- end }}

