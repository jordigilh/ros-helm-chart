{{- if .Values.mockRbac.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cost-management-onprem.fullname" . }}-mock-rbac
  labels:
    {{- include "cost-management-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-rbac
  {{- if .Values.mockRbac.service.annotations }}
  annotations:
    {{- toYaml .Values.mockRbac.service.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mockRbac.service.type | default "ClusterIP" }}
  ports:
  - name: http
    port: {{ .Values.mockRbac.service.port | default 8111 }}
    targetPort: http
    protocol: TCP
    {{- if and (eq (.Values.mockRbac.service.type | default "ClusterIP") "NodePort") .Values.mockRbac.service.nodePort }}
    nodePort: {{ .Values.mockRbac.service.nodePort }}
    {{- end }}
  selector:
    {{- include "cost-management-onprem.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mock-rbac
  
  {{- if eq (.Values.mockRbac.service.type | default "ClusterIP") "LoadBalancer" }}
  {{- if .Values.mockRbac.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.mockRbac.service.loadBalancerIP }}
  {{- end }}
  {{- if .Values.mockRbac.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.mockRbac.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- end }}

{{- end }}
