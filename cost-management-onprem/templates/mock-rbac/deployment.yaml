{{- if .Values.mockRbac.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-management-onprem.fullname" . }}-mock-rbac
  labels:
    {{- include "cost-management-onprem.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-rbac
spec:
  replicas: {{ .Values.mockRbac.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "cost-management-onprem.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mock-rbac
  template:
    metadata:
      labels:
        {{- include "cost-management-onprem.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mock-rbac
    spec:
      containers:
      - name: mock-rbac
        image: "{{ .Values.mockRbac.image.repository }}:{{ .Values.mockRbac.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.mockRbac.image.pullPolicy | default "IfNotPresent" }}
        
        ports:
        - name: http
          containerPort: 8111
          protocol: TCP
        
        env:
        - name: PORT
          value: "8111"
        - name: HOST  
          value: "0.0.0.0"
        - name: DEBUG
          value: {{ .Values.mockRbac.debug | default "false" | quote }}
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Resource management
        resources:
          {{- if .Values.mockRbac.resources }}
          {{- toYaml .Values.mockRbac.resources | nindent 10 }}
          {{- else }}
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
          {{- end }}
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      
      # Pod security context
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Service account (if needed)
      {{- if .Values.mockRbac.serviceAccount }}
      serviceAccountName: {{ .Values.mockRbac.serviceAccount }}
      {{- end }}
      
      # Node selector
      {{- if .Values.mockRbac.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.mockRbac.nodeSelector | nindent 8 }}
      {{- end }}
      
      # Tolerations
      {{- if .Values.mockRbac.tolerations }}
      tolerations:
        {{- toYaml .Values.mockRbac.tolerations | nindent 8 }}
      {{- end }}
      
      # Affinity
      {{- if .Values.mockRbac.affinity }}
      affinity:
        {{- toYaml .Values.mockRbac.affinity | nindent 8 }}
      {{- end }}

{{- end }}
