apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cost-mgmt.trino.worker.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: trino-worker
data:
  config.properties: |
    coordinator=false
    http-server.http.port=8080
    query.max-memory=1GB
    query.max-memory-per-node=512MB
    discovery.uri=http://{{ include "cost-mgmt.trino.coordinator.name" . }}:8080

  jvm.config: |
    -server
    -Xmx{{ .Values.trino.worker.config.jvm.maxHeapSize }}
    -XX:+Use{{ .Values.trino.worker.config.jvm.gcMethod }}
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true

  node.properties: |
    node.environment=production
    node.data-dir=/data/trino

  log.properties: |
    io.trino=INFO

