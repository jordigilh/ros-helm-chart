apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cost-mgmt.trino.coordinator.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: trino-coordinator
spec:
  serviceName: {{ include "cost-mgmt.trino.coordinator.name" . }}
  replicas: {{ .Values.trino.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "cost-mgmt.trino.coordinator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.trino.labels" . | nindent 8 }}
        app.kubernetes.io/component: trino-coordinator
    spec:
      serviceAccountName: {{ include "cost-mgmt.trino.serviceAccountName" . }}

      securityContext:
        {{- include "cost-mgmt.securityContext.pod" . | nindent 8 }}

      containers:
      - name: trino
        image: "{{ .Values.trino.coordinator.image.repository }}:{{ .Values.trino.coordinator.image.tag }}"
        imagePullPolicy: {{ .Values.trino.coordinator.image.pullPolicy }}

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-mgmt.storage.secretName" . }}
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-mgmt.storage.secretName" . }}
              key: secret-key
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-mgmt.koku.database.secretName" . }}
              key: password
        # Hadoop S3A configuration for MinIO/S3 access
        - name: HADOOP_S3A_ENDPOINT
          value: {{ include "cost-mgmt.koku.s3.endpoint" . | quote }}
        - name: HADOOP_S3A_PATH_STYLE_ACCESS
          value: "true"
        - name: HADOOP_S3A_SSL_ENABLED
          value: "false"
        - name: HADOOP_S3A_CONNECTION_SSL_ENABLED
          value: "false"

        livenessProbe:
          {{- toYaml .Values.trino.coordinator.livenessProbe | nindent 10 }}

        readinessProbe:
          {{- toYaml .Values.trino.coordinator.readinessProbe | nindent 10 }}

        resources:
          {{- toYaml .Values.trino.coordinator.resources | nindent 10 }}

        volumeMounts:
        - name: config
          mountPath: /etc/trino/config.properties
          subPath: config.properties
        - name: config
          mountPath: /etc/trino/jvm.config
          subPath: jvm.config
        - name: config
          mountPath: /etc/trino/node.properties
          subPath: node.properties
        - name: config
          mountPath: /etc/trino/log.properties
          subPath: log.properties
        - name: config
          mountPath: /etc/trino/catalog/hive.properties
          subPath: hive.properties
        - name: config
          mountPath: /etc/trino/catalog/postgresql.properties
          subPath: postgresql.properties
        - name: data
          mountPath: /data/trino

        securityContext:
          {{- include "cost-mgmt.securityContext.container" . | nindent 10 }}

      volumes:
      - name: config
        configMap:
          name: {{ include "cost-mgmt.trino.coordinator.name" . }}-config

  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        {{- include "cost-mgmt.trino.labels" . | nindent 8 }}
    spec:
      accessModes:
        {{- toYaml .Values.trino.coordinator.storage.accessModes | nindent 8 }}
      {{- if .Values.trino.coordinator.storage.storageClassName }}
      storageClassName: {{ .Values.trino.coordinator.storage.storageClassName }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.trino.coordinator.storage.size }}

