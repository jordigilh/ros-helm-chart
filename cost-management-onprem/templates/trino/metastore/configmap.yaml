apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cost-mgmt.trino.metastore.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.trino.labels" . | nindent 4 }}
    app.kubernetes.io/component: hive-metastore
data:
  metastore-site.xml: |
    <?xml version="1.0"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>metastore.thrift.uris</name>
        <value>thrift://{{ include "cost-mgmt.trino.metastore.name" . }}:{{ .Values.trino.metastore.service.port }}</value>
      </property>
      <property>
        <name>metastore.task.threads.always</name>
        <value>org.apache.hadoop.hive.metastore.events.EventCleanerTask</value>
      </property>
      <property>
        <name>metastore.expression.proxy</name>
        <value>org.apache.hadoop.hive.metastore.DefaultPartitionExpressionProxy</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>{{ include "cost-mgmt.trino.metastore.database.url" . }}</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>{{ .Values.trino.metastore.database.user }}</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>METASTORE_DB_PASSWORD</value>
      </property>
      <property>
        <name>metastore.warehouse.dir</name>
        <value>file:///tmp/warehouse</value>
        <description>Default warehouse location (not used for external tables). Using local filesystem to avoid S3A dependencies for on-prem deployment.</description>
      </property>
    </configuration>

