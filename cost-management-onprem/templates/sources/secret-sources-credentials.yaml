{{- if .Values.sourcesApi.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cost-management-onprem.fullname" . }}-sources-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-management-onprem.labels" . | nindent 4 }}
type: Opaque
data:
  database-password: {{ .Values.sourcesApi.database.password | default "postgres" | b64enc | quote }}
  encryption-key: {{ .Values.sourcesApi.encryptionKey | b64enc | quote }}
{{- end }}
