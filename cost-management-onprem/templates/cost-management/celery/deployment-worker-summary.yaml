apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.celery.worker.name" (dict "context" . "type" "summary") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: cost-management-celery
    celery-type: worker
    worker-queue: summary
spec:
  replicas: {{ .Values.costManagement.celery.workers.summary.replicas }}
  selector:
    matchLabels:
      {{- include "cost-mgmt.koku.celery.worker.selectorLabels" (dict "context" . "type" "summary") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: cost-management-celery
        celery-type: worker
        worker-queue: summary
    spec:
      serviceAccountName: {{ include "cost-mgmt.koku.serviceAccountName" . }}

      securityContext:
        {{- include "cost-mgmt.securityContext.pod" . | nindent 8 }}

      containers:
      - name: celery-worker
        image: "{{ .Values.costManagement.api.image.repository }}:{{ .Values.costManagement.api.image.tag }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}

        command:
          - /bin/sh
          - -c
          - |
            celery -A koku worker \
              --loglevel=INFO \
              --queues={{ .Values.costManagement.celery.workers.summary.queue }} \
              --concurrency={{ .Values.costManagement.celery.workers.summary.concurrency }}

        env:
        {{- include "cost-mgmt.koku.commonEnv" . | nindent 8 }}
        {{- range $key, $value := .Values.costManagement.celery.workers.commonEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        resources:
          {{- toYaml .Values.costManagement.celery.workers.summary.resources | nindent 10 }}

        volumeMounts:
        - name: tmp
          mountPath: /tmp

        securityContext:
          {{- include "cost-mgmt.securityContext.container" . | nindent 10 }}

      volumes:
      - name: tmp
        emptyDir: {}

