apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.celery.worker.name" (dict "context" . "type" "hcs") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: cost-management-celery
    celery-type: worker
    worker-queue: hcs
spec:
  replicas: {{ .Values.costManagement.celery.workers.hcs.replicas }}
  selector:
    matchLabels:
      {{- include "cost-mgmt.koku.celery.worker.selectorLabels" (dict "context" . "type" "hcs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: cost-management-celery
        celery-type: worker
        worker-queue: hcs
    spec:
      serviceAccountName: {{ include "cost-mgmt.koku.serviceAccountName" . }}
      
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      
      containers:
      - name: celery-worker
        image: "{{ .Values.costManagement.api.image.repository }}:{{ .Values.costManagement.api.image.tag }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}
        
        command:
          - /bin/sh
          - -c
          - |
            celery -A koku worker \
              --loglevel=INFO \
              --queues={{ .Values.costManagement.celery.workers.hcs.queue }} \
              --concurrency={{ .Values.costManagement.celery.workers.hcs.concurrency }}
        
        env:
        {{- include "cost-mgmt.koku.commonEnv" . | nindent 8 }}
        {{- range $key, $value := .Values.costManagement.celery.workers.commonEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        resources:
          {{- toYaml .Values.costManagement.celery.workers.hcs.resources | nindent 10 }}
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
      
      volumes:
      - name: tmp
        emptyDir: {}

