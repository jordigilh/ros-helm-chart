apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.celery.worker.name" (dict "context" . "type" "refresh") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: cost-management-celery
    celery-type: worker
    worker-queue: refresh
spec:
  replicas: {{ .Values.costManagement.celery.workers.refresh.replicas }}
  selector:
    matchLabels:
      {{- include "cost-mgmt.koku.celery.worker.selectorLabels" (dict "context" . "type" "refresh") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: cost-management-celery
        celery-type: worker
        worker-queue: refresh
    spec:
      serviceAccountName: {{ include "cost-mgmt.koku.serviceAccountName" . }}

      securityContext:
        {{- include "cost-mgmt.securityContext.pod" . | nindent 8 }}

      containers:
      - name: celery-worker
        image: "{{ include "cost-mgmt.koku.image" . }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}

        command:
          - /bin/sh
          - -c
          - |
            cd $APP_HOME
            PYTHONPATH=$APP_HOME celery -A koku worker --without-gossip -E -l ${CELERY_LOG_LEVEL:-info} -Q ${WORKER_QUEUES}

        env:
        - name: CELERY_LOG_LEVEL
          value: "info"
        - name: WORKER_QUEUES
          value: {{ .Values.costManagement.celery.workers.refresh.queue | quote }}
        {{- include "cost-mgmt.koku.commonEnv" . | nindent 8 }}
        {{- range $key, $value := .Values.costManagement.celery.workers.commonEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
{{- if eq (include "cost-mgmt.isOpenShift" .) "true" }}
      - name: service-ca-cert
        configMap:
          name: {{ include "cost-mgmt.fullname" . }}-service-ca
          items:
            - key: service-ca.crt
              path: service-ca.crt
{{- end }}

        volumeMounts:
{{- if eq (include "cost-mgmt.isOpenShift" .) "true" }}
        - name: service-ca-cert
          mountPath: /etc/ssl/certs/service-ca.crt
          subPath: service-ca.crt
          readOnly: true
{{- end }}
        - name: tmp
          mountPath: /tmp

        resources:
          {{- toYaml .Values.costManagement.celery.workers.refresh.resources | nindent 10 }}

        volumeMounts:
{{- if eq (include "cost-mgmt.isOpenShift" .) "true" }}
        - name: service-ca-cert
          mountPath: /etc/ssl/certs/service-ca.crt
          subPath: service-ca.crt
          readOnly: true
{{- end }}
        - name: tmp
          mountPath: /tmp

        securityContext:
          {{- include "cost-mgmt.securityContext.container" . | nindent 10 }}

      volumes:
      - name: tmp
        emptyDir: {}

