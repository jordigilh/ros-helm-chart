{{- if .Values.costManagement.masu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.api.reads.name" . | replace "reads" "masu" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: masu
spec:
  replicas: {{ .Values.costManagement.masu.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cost-mgmt.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: masu
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: masu
    spec:
      serviceAccountName: {{ .Values.costManagement.serviceAccount.name }}
      containers:
      - name: masu
        image: "{{ include "cost-mgmt.koku.image" . }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}
        
        ports:
        - containerPort: 8000
          protocol: TCP
          
        # Health checks
        livenessProbe:
          httpGet:
            path: /api/cost-management/v1/status/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 5
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /api/cost-management/v1/status/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 5
          successThreshold: 1

        # Resource limits and requests  
        resources:
          {{- toYaml .Values.costManagement.masu.resources | nindent 10 }}

        # Environment variables
        env:
        # Database connection
        - name: DATABASE_SERVICE_NAME
          value: database
        - name: DATABASE_ENGINE
          value: postgresql
        - name: DATABASE_SERVICE_HOST
          value: cost-mgmt-cost-management-onprem-koku-db
        - name: DATABASE_SERVICE_PORT
          value: "5432"
        - name: DATABASE_NAME
          value: {{ .Values.costManagement.database.env.POSTGRES_DB }}
        - name: DATABASE_USER
          value: {{ .Values.costManagement.database.env.POSTGRES_USER }}
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cost-mgmt-cost-management-onprem-koku-db-credentials
              key: password

        # Redis configuration
        - name: REDIS_HOST
          value: {{ .Values.infrastructure.redis.host }}
        - name: REDIS_PORT
          value: "{{ .Values.infrastructure.redis.port }}"

        # Kafka configuration  
        - name: INSIGHTS_KAFKA_HOST
          value: kafka
        - name: INSIGHTS_KAFKA_PORT
          value: "9092"

        # S3 configuration
        - name: S3_ENDPOINT
          value: {{ .Values.infrastructure.storage.endpoint }}

        # Trino configuration
        - name: TRINO_HOST
          value: cost-mgmt-cost-management-onprem-trino-coordinator
        - name: TRINO_PORT
          value: "8080"

        # Django secret
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cost-mgmt-cost-management-onprem-django-secret
              key: secret-key

        # MASU-specific environment variables
        {{- range $key, $value := .Values.costManagement.masu.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        # Application-specific
        - name: MASU
          value: "true"
        - name: API_PATH_PREFIX
          value: /api/cost-management
        - name: KAFKA_CONNECT
          value: "true"

        # Command to run MASU server
        command:
        - /bin/bash
        - -c
        - |
          cd $APP_HOME
          exec gunicorn -c gunicorn_conf.py --max-requests=1000 koku.wsgi
{{- end }}
