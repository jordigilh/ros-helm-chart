{{- if .Values.costManagement.masu.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.api.reads.name" . | replace "reads" "masu" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: masu
spec:
  replicas: {{ .Values.costManagement.masu.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cost-mgmt.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: masu
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: masu
    spec:
      serviceAccountName: {{ .Values.costManagement.serviceAccount.name }}
      containers:
      - name: masu
        image: "{{ include "cost-mgmt.koku.image" . }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}
        
        ports:
        - containerPort: 8000
          protocol: TCP
          
        # Health checks
        livenessProbe:
          httpGet:
            path: /api/cost-management/v1/status/
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 5
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /api/cost-management/v1/status/
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 10
          successThreshold: 1
      volumes:
      - name: tmp
        emptyDir: {}
{{- if eq (include "cost-mgmt.isOpenShift" .) "true" }}
      - name: service-ca-cert
        configMap:
          name: {{ include "cost-mgmt.fullname" . }}-service-ca
          items:
            - key: service-ca.crt
              path: service-ca.crt
{{- end }}

        # Resource limits and requests  
        volumeMounts:
{{- if eq (include "cost-mgmt.isOpenShift" .) "true" }}
        - name: service-ca-cert
          mountPath: /etc/ssl/certs/service-ca.crt
          subPath: service-ca.crt
          readOnly: true
{{- end }}
        - name: tmp
          mountPath: /tmp

        resources:
          {{- toYaml .Values.costManagement.masu.resources | nindent 10 }}

        # Environment variables
        env:
        {{- include "cost-mgmt.koku.commonEnv" . | nindent 8 }}
        # MASU-specific environment variables
        {{- range $key, $value := .Values.costManagement.masu.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        # Application-specific
        - name: MASU
          value: "true"
        - name: API_PATH_PREFIX
          value: /api/cost-management
        - name: KAFKA_CONNECT
          value: "true"

        # Command to run MASU server
        command:
        - /bin/bash
        - -c
        - |
          cd $APP_HOME
          exec gunicorn -c gunicorn_conf.py --max-requests=1000 koku.wsgi
{{- end }}
