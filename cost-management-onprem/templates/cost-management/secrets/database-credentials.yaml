apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cost-mgmt.koku.database.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
data:
  {{- $secretObj := (lookup "v1" "Secret" .Release.Namespace (include "cost-mgmt.koku.database.secretName" .)) | default dict }}
  {{- $secretData := (get $secretObj "data") | default dict }}
  {{- $password := (get $secretData "password") | default (randAlphaNum 16 | b64enc) }}
  password: {{ $password | quote }}
  username: {{ .Values.costManagement.database.user | b64enc | quote }}
  database: {{ .Values.costManagement.database.name | b64enc | quote }}

