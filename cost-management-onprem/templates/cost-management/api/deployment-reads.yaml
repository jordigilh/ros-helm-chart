apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-mgmt.koku.api.reads.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: cost-management-api
    api-type: reads
spec:
  replicas: {{ .Values.costManagement.api.reads.replicas }}
  selector:
    matchLabels:
      {{- include "cost-mgmt.koku.api.reads.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.koku.labels" . | nindent 8 }}
        app.kubernetes.io/component: cost-management-api
        api-type: reads
    spec:
      serviceAccountName: {{ include "cost-mgmt.koku.serviceAccountName" . }}
      
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      
      containers:
      - name: koku-api
        image: "{{ .Values.costManagement.api.image.repository }}:{{ .Values.costManagement.api.image.tag }}"
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}
        
        command:
          - /bin/sh
          - -c
          - |
            # Run database migrations (reads can run them too for HA)
            python koku/manage.py migrate --noinput
            # Start Gunicorn
            gunicorn koku.wsgi --bind=0.0.0.0:8000 --access-logfile=- --error-logfile=- --config gunicorn_conf.py
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        {{- include "cost-mgmt.koku.commonEnv" . | nindent 8 }}
        {{- range $key, $value := .Values.costManagement.api.reads.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        livenessProbe:
          {{- toYaml .Values.costManagement.api.reads.livenessProbe | nindent 10 }}
        
        readinessProbe:
          {{- toYaml .Values.costManagement.api.reads.readinessProbe | nindent 10 }}
        
        resources:
          {{- toYaml .Values.costManagement.api.reads.resources | nindent 10 }}
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
      
      volumes:
      - name: tmp
        emptyDir: {}

