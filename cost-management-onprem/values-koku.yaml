# values-koku.yaml
# Koku Cost Management Configuration for cost-management-onprem Chart
#
# This file extends the base values.yaml (from PR #27) with Koku-specific configuration
#
# Usage:
#   helm install cost-mgmt ./cost-management-onprem \
#     -f cost-management-onprem/values.yaml \
#     -f cost-management-onprem/values-koku.yaml
#
# Platform: OpenShift 4.10+ ONLY
# Profile: Minimal (for development and integration testing)

# =============================================================================
# Koku Cost Management Configuration
# =============================================================================

costManagement:
  # ---------------------------------------------------------------------------
  # Koku API Configuration
  # ---------------------------------------------------------------------------
  api:
    # Image configuration
    image:
      # Use ImageStream for in-cluster builds (set to false to use external registry)
      useImageStream: true
      repository: quay.io/cloudservices/koku  # Only used if useImageStream=false
      tag: "latest"
      pullPolicy: IfNotPresent

    # API Reads Deployment (read-only queries)
    reads:
      replicas: 2

      resources:
        requests:
          cpu: 300m
          memory: 500Mi
        limits:
          cpu: 600m
          memory: 1Gi

      # Health checks
      livenessProbe:
        httpGet:
          path: /api/cost-management/v1/status/
          port: 8000
          scheme: HTTP
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 5
        successThreshold: 1

      readinessProbe:
        httpGet:
          path: /api/cost-management/v1/status/
          port: 8000
          scheme: HTTP
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 5
        successThreshold: 1

      # Environment variables
      env:
        API_PATH_PREFIX: /api/cost-management
        DEVELOPMENT: "False"
        GUNICORN_LOG_LEVEL: INFO
        KOKU_LOG_LEVEL: INFO
        DJANGO_LOG_LEVEL: INFO
        DJANGO_LOG_FORMATTER: simple
        DJANGO_LOG_HANDLERS: console
        PROMETHEUS_MULTIPROC_DIR: /tmp
        REQUESTED_BUCKET: koku-report
        REQUESTED_ROS_BUCKET: ros-report
        KOKU_ENABLE_SENTRY: "False"
        CACHED_VIEWS_DISABLED: "False"
        RETAIN_NUM_MONTHS: "3"
        NOTIFICATION_CHECK_TIME: "24"  # Hours (integer), not time string
        ENHANCED_ORG_ADMIN: "False"
        RBAC_CACHE_TIMEOUT: "300"
        CACHE_TIMEOUT: "3600"
        TAG_ENABLED_LIMIT: "200"
        USE_READREPLICA: "False"
        GUNICORN_WORKERS: "2"
        GUNICORN_THREADS: "4"

    # API Writes Deployment (write operations)
    writes:
      replicas: 1

      resources:
        requests:
          cpu: 300m
          memory: 500Mi
        limits:
          cpu: 600m
          memory: 1Gi

      # Health checks (same as reads)
      livenessProbe:
        httpGet:
          path: /api/cost-management/v1/status/
          port: 8000
          scheme: HTTP
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 5
        successThreshold: 1

      readinessProbe:
        httpGet:
          path: /api/cost-management/v1/status/
          port: 8000
          scheme: HTTP
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 5
        successThreshold: 1

      # Environment variables (same as reads)
      env:
        API_PATH_PREFIX: /api/cost-management
        DEVELOPMENT: "False"
        GUNICORN_LOG_LEVEL: INFO
        KOKU_LOG_LEVEL: INFO
        DJANGO_LOG_LEVEL: INFO
        DJANGO_LOG_FORMATTER: simple
        DJANGO_LOG_HANDLERS: console
        PROMETHEUS_MULTIPROC_DIR: /tmp
        REQUESTED_BUCKET: koku-report
        REQUESTED_ROS_BUCKET: ros-report
        KOKU_ENABLE_SENTRY: "False"
        GUNICORN_WORKERS: "1"
        GUNICORN_THREADS: "4"

    # Service configuration
    service:
      type: ClusterIP
      port: 8000
      targetPort: 8000
      name: koku-api

  # ---------------------------------------------------------------------------
  # Celery Configuration
  # ---------------------------------------------------------------------------
  celery:
    # Celery Beat Scheduler (must be exactly 1 replica)
    beat:
      replicas: 1  # MUST be exactly 1

      resources:
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          cpu: 200m
          memory: 400Mi

      # Beat is a scheduler - no health probes needed
      # It runs continuously once started; no requests to handle
      # Kubernetes will restart if container crashes
      # No readiness probe: Beat is "ready" as soon as it starts
      # No liveness probe: If Beat crashes, container exits

      env:
        KOKU_LOG_LEVEL: INFO
        DJANGO_LOG_LEVEL: INFO
        PROMETHEUS_MULTIPROC_DIR: /tmp

    # Celery Workers
    workers:
      # Common environment variables for all workers
      commonEnv:
        KOKU_LOG_LEVEL: INFO
        DJANGO_LOG_LEVEL: INFO
        PROMETHEUS_MULTIPROC_DIR: /tmp
        REQUESTED_BUCKET: koku-report
        REQUESTED_ROS_BUCKET: ros-report

      # Essential Workers
      default:
        replicas: 1
        queue: default
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      priority:
        replicas: 1
        queue: priority
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      refresh:
        replicas: 1
        queue: refresh
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      summary:
        replicas: 1
        queue: summary
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      hcs:
        replicas: 1
        queue: hcs
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      # XL Workers (minimal for dev - same resources as essential)
      priorityXl:
        replicas: 1
        queue: priority,priority_xl
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      refreshXl:
        replicas: 1
        queue: refresh,refresh_xl
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      summaryXl:
        replicas: 1
        queue: summary,summary_xl
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      # Penalty Workers
      priorityPenalty:
        replicas: 1
        queue: priority,priority_penalty
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      refreshPenalty:
        replicas: 1
        queue: refresh,refresh_penalty
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

      summaryPenalty:
        replicas: 1
        queue: summary,summary_penalty
        concurrency: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 200m
            memory: 400Mi

  # ---------------------------------------------------------------------------
  # Database Configuration
  # ---------------------------------------------------------------------------
  database:
    # Database connection settings
    host: ""  # Auto-resolved by helper: cost-mgmt.database.host
    port: 5432
    name: koku
    user: koku
    sslMode: disable

    # PostgreSQL image
    image:
      repository: quay.io/sclorg/postgresql-13-c9s  # Public, no rate limits
      tag: "latest"
      pullPolicy: IfNotPresent

    # Resources for Koku database
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Storage configuration
    storage:
      size: 20Gi
      storageClassName: ""  # Use default storage class in cluster
      accessModes:
        - ReadWriteOnce

    # Environment variables for PostgreSQL
    env:
      POSTGRES_DB: koku
      POSTGRES_USER: koku
      # POSTGRES_PASSWORD: Auto-generated in secret
      PGDATA: /var/lib/postgresql/data/pgdata

  # ---------------------------------------------------------------------------
  # Django Configuration
  # ---------------------------------------------------------------------------
  django:
    # Secret key auto-generated (50 alphanumeric characters)
    secretKeyLength: 50

  # ---------------------------------------------------------------------------
  # Service Account Configuration
  # ---------------------------------------------------------------------------
  serviceAccount:
    create: true
    name: koku
    annotations: {}

  # ---------------------------------------------------------------------------
  # NetworkPolicy Configuration (always enabled for OpenShift)
  # ---------------------------------------------------------------------------
  networkPolicies:
    # Ingress rules for Koku API
    api:
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: ingress
          ports:
            - protocol: TCP
              port: 8000
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: postgresql
          ports:
            - protocol: TCP
              port: 5432
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: redis
          ports:
            - protocol: TCP
              port: 6379
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: kafka
          ports:
            - protocol: TCP
              port: 29092
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: minio
          ports:
            - protocol: TCP
              port: 9000
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: trino-coordinator
          ports:
            - protocol: TCP
              port: 8080

    # Celery workers and beat
    celery:
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: postgresql
          ports:
            - protocol: TCP
              port: 5432
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: redis
          ports:
            - protocol: TCP
              port: 6379
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: kafka
          ports:
            - protocol: TCP
              port: 29092
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: minio
          ports:
            - protocol: TCP
              port: 9000
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: trino-coordinator
          ports:
            - protocol: TCP
              port: 8080

    # DNS egress for all pods
    dnsEgress:
      - to:
          - namespaceSelector:
              matchLabels:
                name: openshift-dns
        ports:
          - protocol: UDP
            port: 53

# =============================================================================
# Trino Analytics Engine Configuration (Minimal Profile)
# =============================================================================

trino:
  profile: minimal  # minimal, dev, or production

  # ---------------------------------------------------------------------------
  # Trino Coordinator
  # ---------------------------------------------------------------------------
  coordinator:
    replicas: 1

    # Image configuration
    image:
      repository: quay.io/insights-onprem/trino  # Mirrored from Docker Hub to avoid rate limits
      tag: "latest"
      pullPolicy: IfNotPresent

    # Resources (minimal profile)
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi

    # Storage for query spill
    storage:
      size: 5Gi
      storageClassName: ""  # Use default storage class in cluster
      accessModes:
        - ReadWriteOnce

    # Service configuration
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      name: trino-coordinator

    # Health checks
    livenessProbe:
      httpGet:
        path: /v1/info
        port: 8080
        scheme: HTTP
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /v1/info/state
        port: 8080
        scheme: HTTP
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 6

    # JVM configuration (minimal)
    config:
      jvm:
        maxHeapSize: "1G"
        gcMethod: "G1GC"  # Template already has -XX:+Use prefix

      # Coordinator configuration
      coordinator: true
      nodeScheduler:
        includeCoordinator: false

      # Catalogs
      catalogs:
        # Hive catalog for Parquet files in MinIO
        hive:
          connector: hive-hadoop2
          metastoreUri: ""  # Auto-resolved: thrift://hive-metastore:9083
          s3:
            endpoint: ""  # Auto-resolved from MinIO
            accessKey: ""  # Auto-resolved from MinIO
            secretKey: ""  # Auto-resolved from MinIO
            pathStyleAccess: true

        # PostgreSQL catalog for Koku database
        postgresql:
          connector: postgresql
          connectionUrl: ""  # Auto-resolved: jdbc:postgresql://koku-db:5432/koku
          user: ""  # Auto-resolved from Koku DB
          password: ""  # Auto-resolved from Koku DB

  # ---------------------------------------------------------------------------
  # Trino Workers
  # ---------------------------------------------------------------------------
  worker:
    replicas: 1  # Minimal: 1 worker for dev

    # Image configuration
    image:
      repository: quay.io/insights-onprem/trino  # Mirrored from Docker Hub to avoid rate limits
      tag: "latest"
      pullPolicy: IfNotPresent

    # Resources (minimal profile)
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi

    # Storage for query spill
    storage:
      size: 5Gi
      storageClassName: ""  # Use default storage class in cluster
      accessModes:
        - ReadWriteOnce

    # JVM configuration (minimal)
    config:
      jvm:
        maxHeapSize: "1G"
        gcMethod: "G1GC"  # Template already has -XX:+Use prefix

      # Worker configuration
      coordinator: false

  # ---------------------------------------------------------------------------
  # Hive Metastore
  # ---------------------------------------------------------------------------
  metastore:
    replicas: 1

    # Image configuration
    image:
      repository: quay.io/insights-onprem/hive  # Mirrored from Docker Hub to avoid rate limits
      tag: "3.1.3"
      pullPolicy: IfNotPresent

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 250m
        memory: 512Mi

    # Storage for warehouse directory (persistent across restarts)
    storage:
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      # storageClassName: ""  # Uses default storage class if not specified

    # Service configuration
    service:
      type: ClusterIP
      port: 9083
      targetPort: 9083
      name: hive-metastore

    # Database configuration
    database:
      # Database connection
      host: ""  # Auto-resolved: hive-metastore-db
      port: 5432
      name: metastore
      user: metastore

      # PostgreSQL image
      image:
        repository: quay.io/sclorg/postgresql-13-c9s  # Public, no rate limits
        tag: "latest"
        pullPolicy: IfNotPresent

      # Resources
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 256Mi

      # Storage
      storage:
        size: 2Gi
        storageClassName: ""  # Use default storage class in cluster
        accessModes:
          - ReadWriteOnce

      # Environment variables
      env:
        POSTGRES_DB: metastore
        POSTGRES_USER: metastore
        # POSTGRES_PASSWORD: Auto-generated in secret

  # ---------------------------------------------------------------------------
  # Service Account Configuration
  # ---------------------------------------------------------------------------
  serviceAccount:
    create: true
    name: trino
    annotations: {}

  # ---------------------------------------------------------------------------
  # NetworkPolicy Configuration (always enabled for OpenShift)
  # ---------------------------------------------------------------------------
  networkPolicies:
    # Trino Coordinator
    coordinator:
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: cost-management-api
          ports:
            - protocol: TCP
              port: 8080
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: cost-management-celery
          ports:
            - protocol: TCP
              port: 8080
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: trino-worker
          ports:
            - protocol: TCP
              port: 8080
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: hive-metastore
          ports:
            - protocol: TCP
              port: 9083
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: minio
          ports:
            - protocol: TCP
              port: 9000
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: postgresql
          ports:
            - protocol: TCP
              port: 5432

    # Trino Workers
    worker:
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: trino-coordinator
          ports:
            - protocol: TCP
              port: 8080
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: minio
          ports:
            - protocol: TCP
              port: 9000
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: postgresql
          ports:
            - protocol: TCP
              port: 5432

    # Hive Metastore
    metastore:
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: trino-coordinator
          ports:
            - protocol: TCP
              port: 9083
      egress:
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: hive-metastore-db
          ports:
            - protocol: TCP
              port: 5432

