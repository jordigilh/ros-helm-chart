apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cost-mgmt.koku.api.name" . }}-db-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration
  annotations:
    # Helm hooks for automatic database migration
    # post-install: Runs after all resources are created (database must exist first)
    # pre-upgrade: Runs before upgrade to ensure schema is updated before new code runs
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "cost-mgmt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- include "cost-mgmt.securityContext.pod" . | nindent 8 }}
      containers:
      - name: db-migrate
        image: {{ include "cost-mgmt.koku.image" . }}
        imagePullPolicy: {{ .Values.costManagement.api.image.pullPolicy }}
        securityContext:
          {{- include "cost-mgmt.securityContext.container" . | nindent 10 }}
        command:
          - /bin/bash
          - -c
          - |
            # Run Django database migrations
            echo "Starting database migration..."
            mkdir -p /tmp/prometheus
            cd /opt/koku

            # Wait for database to be ready (DNS and connection)
            echo "Waiting for database to be ready..."
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if python -c "import psycopg2; psycopg2.connect(host='${DATABASE_SERVICE_HOST}', port='${DATABASE_SERVICE_PORT}', dbname='${DATABASE_NAME}', user='${DATABASE_USER}', password='${DATABASE_PASSWORD}')" 2>/dev/null; then
                echo "✅ Database is ready!"
                break
              fi
              attempt=$((attempt + 1))
              echo "Waiting for database... (attempt $attempt/$max_attempts)"
              sleep 2
            done

            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Database did not become ready in time"
              exit 1
            fi

            # Run migrations
            python koku/manage.py migrate --noinput
            echo "Migration completed successfully"
        env:
        # Prometheus multiproc directory (required to avoid permission errors)
        - name: PROMETHEUS_MULTIPROC_DIR
          value: "/tmp/prometheus"
        # Database connection (required for migrations)
        - name: DATABASE_SERVICE_NAME
          value: "database"
        - name: DATABASE_ENGINE
          value: "postgresql"
        - name: DATABASE_SERVICE_HOST
          value: {{ include "cost-mgmt.koku.database.host" . | quote }}
        - name: DATABASE_SERVICE_PORT
          value: {{ include "cost-mgmt.koku.database.port" . | quote }}
        - name: DATABASE_NAME
          value: {{ include "cost-mgmt.koku.database.dbname" . | quote }}
        - name: DATABASE_USER
          value: {{ include "cost-mgmt.koku.database.user" . | quote }}
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-mgmt.koku.database.secretName" . }}
              key: password
        # Django secret key (required by Django management commands)
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "cost-mgmt.koku.django.secretName" . }}
              key: secret-key
        # Migration-specific settings
        - name: CLOWDER_ENABLED
          value: "False"
        - name: DEVELOPMENT
          value: "False"
        - name: KOKU_LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

