apiVersion: v1
kind: Service
metadata:
  name: {{ include "cost-mgmt.koku.database.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cost-mgmt.koku.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/name: koku-database
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - name: postgresql
    port: {{ .Values.costManagement.database.port }}
    targetPort: 5432
    protocol: TCP
  selector:
    {{- include "cost-mgmt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/name: koku-database

